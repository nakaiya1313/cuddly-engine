<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ボディチェック記録</title>
<style>
  :root{
    --ink:#20303a; --ink-soft:#5b6b74; --line:#d3dade; --bg:#eef1f2;
    --panel:#ffffff; --fig-bg:#e6eaec; --accent:#2f7e7e; --accent-d:#266767; --danger:#b23a48;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic UI","Meiryo",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.55;-webkit-text-size-adjust:100%;}
  .wrap{max-width:560px;margin:0 auto;padding:14px 14px 170px;}
  header.app{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  header.app .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  header.app .logo svg{width:20px;height:20px;}
  header.app h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.02em;}
  header.app p{margin:0;font-size:11.5px;color:var(--ink-soft);}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:12px;}
  .card h2{font-size:12px;color:var(--ink-soft);margin:0 0 8px;font-weight:700;letter-spacing:.08em;}
  .meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .meta label{font-size:11px;color:var(--ink-soft);display:block;margin-bottom:3px;}
  .meta input{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 10px;font-size:15px;font-family:inherit;background:#fafbfb;color:var(--ink);}
  .meta .full{grid-column:1 / -1;}
  .views,.modebar{display:flex;gap:6px;margin-bottom:10px;}
  .views button{flex:1;border:1px solid var(--line);background:#fafbfb;color:var(--ink-soft);padding:9px 0;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;}
  .views button.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .modebar button{flex:1;border:1.5px solid var(--line);background:#fafbfb;color:var(--ink-soft);padding:11px 0;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;}
  .modebar button.on{background:#20303a;border-color:#20303a;color:#fff;}
  #mAdd.on{background:var(--accent);border-color:var(--accent);}
  .mode-hint{font-size:11.5px;color:var(--ink-soft);text-align:center;margin:0 0 8px;min-height:17px;}
  .stage{background:var(--fig-bg);border-radius:12px;overflow:hidden;position:relative;border:1px solid var(--line);}
  canvas{display:block;width:100%;height:auto;touch-action:none;}
  .legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .legend .chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft);background:#fafbfb;border:1px solid var(--line);border-radius:20px;padding:4px 9px;}
  .legend .dot{width:11px;height:11px;border-radius:50%;}
  .imgrow{display:flex;gap:8px;margin-top:10px;}
  .adslot{margin-top:2px;min-height:90px;border:1.5px dashed var(--line);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#aab3b8;font-size:12px;background:#fafbfb;text-align:center;padding:8px;}
  .mark-list{list-style:none;margin:0;padding:0;}
  .mark-list li{display:flex;align-items:flex-start;gap:9px;padding:9px 4px;border-top:1px solid var(--line);}
  .mark-list li:first-child{border-top:none;}
  .badge{width:23px;height:23px;border-radius:50%;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 auto;margin-top:1px;}
  .mark-body{flex:1;min-width:0;}
  .mark-body .t{font-size:14px;font-weight:600;}
  .mark-body .s{font-size:12px;color:var(--ink-soft);word-break:break-word;}
  .mark-list .view-tag{font-size:10.5px;color:var(--ink-soft);background:#eef1f2;border-radius:6px;padding:1px 6px;margin-left:6px;}
  .empty{font-size:13px;color:var(--ink-soft);text-align:center;padding:14px 0;}
  .export-row{display:flex;gap:8px;}
  .btn{flex:1;border:none;border-radius:11px;padding:13px 0;font-size:15px;font-weight:700;font-family:inherit;background:var(--accent);color:#fff;}
  .btn.ghost{background:#fafbfb;color:var(--accent-d);border:1px solid var(--accent);}
  .btn:active{transform:translateY(1px);}
  .sheet-bg{position:fixed;inset:0;background:rgba(20,30,36,.4);display:none;z-index:30;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:31;background:#fff;border-radius:18px 18px 0 0;padding:14px 16px calc(16px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto;transform:translateY(100%);transition:transform .22s ease;box-shadow:0 -6px 24px rgba(0,0,0,.14);max-height:88vh;overflow:auto;}
  .sheet.open{transform:translateY(0);}
  .sheet .grip{width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 12px;}
  .sheet h3{margin:0 0 10px;font-size:15px;display:flex;align-items:center;gap:8px;}
  .fld{margin-bottom:12px;}
  .fld label{font-size:11px;color:var(--ink-soft);display:block;margin-bottom:3px;}
  .fld input{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 10px;font-size:15px;font-family:inherit;}
  .tpl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:12px;}
  .tpl{display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);border-radius:10px;padding:9px 10px;font-size:13.5px;font-weight:600;background:#fafbfb;}
  .tpl .d{width:14px;height:14px;border-radius:50%;flex:0 0 auto;}
  .tpl.sel{border-color:var(--ink);background:#fff;}
  .size-row{display:flex;gap:8px;margin-bottom:12px;}
  .size-row .f{flex:1;}
  .size-row label{font-size:11px;color:var(--ink-soft);display:block;margin-bottom:3px;}
  .size-row input{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px;font-size:15px;font-family:inherit;text-align:center;}
  .sheet textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;font-size:15px;font-family:inherit;resize:none;min-height:58px;margin-bottom:14px;}
  .sheet-actions{display:flex;gap:8px;}
  .sheet-actions .del{flex:0 0 auto;background:#fff;color:var(--danger);border:1px solid var(--danger);border-radius:11px;padding:13px 16px;font-weight:700;font-family:inherit;}
  .sheet-actions .done{flex:1;border:none;border-radius:11px;padding:13px 0;font-size:15px;font-weight:700;background:var(--accent);color:#fff;font-family:inherit;}
  .modal-bg{position:fixed;inset:0;background:rgba(20,30,36,.62);display:none;z-index:40;align-items:center;justify-content:center;padding:16px;}
  .modal{background:#fff;border-radius:16px;padding:14px;max-width:520px;width:100%;max-height:90vh;overflow:auto;}
  .modal p{font-size:12.5px;color:var(--ink-soft);margin:0 0 10px;text-align:center;}
  .modal img{width:100%;border:1px solid var(--line);border-radius:10px;display:block;margin-bottom:12px;}
  .modal .row{display:flex;gap:8px;}
  .modal a.btn{display:flex;align-items:center;justify-content:center;text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.4"/><path d="M12 8v8M12 16l-3 4M12 16l3 4M6 10l6 2 6-2"/></svg></div>
    <div><h1>ボディチェック記録</h1><p>傷・内出血・褥瘡などの部位を記録します</p></div>
  </header>

  <div class="card">
    <h2>利用者情報</h2>
    <div class="meta">
      <div class="full"><label>利用者名</label><input id="resName" placeholder="例）山田 花子"></div>
      <div><label>記録日</label><input id="recDate" type="date"></div>
      <div><label>記録者</label><input id="recBy" placeholder="担当者名"></div>
    </div>
    <button class="btn ghost" id="clearBtn" style="width:100%;margin-top:10px;font-size:14px;padding:11px 0;">新規記録（内容をすべてクリア）</button>
  </div>

  <div class="card">
    <h2>人体図</h2>
    <div class="modebar" id="modeBar">
      <button id="mAdd" data-m="add">✏ 追加</button>
      <button id="mMove" data-m="move" class="on">✋ 移動・確認</button>
    </div>
    <div class="views" id="viewTabs">
      <button data-v="front" class="on">前面</button>
      <button data-v="back">背面</button>
      <button data-v="left">左側面</button>
      <button data-v="right">右側面</button>
    </div>
    <p class="mode-hint" id="hint"></p>
    <div class="stage"><canvas id="cv" width="560" height="880"></canvas></div>
    <div class="legend" id="legend"></div>
    <div class="imgrow">
      <button class="btn ghost" id="loadImgBtn" style="font-size:13.5px;padding:10px 0;">📷 この向きに画像を読み込む</button>
      <button class="btn ghost" id="resetImgBtn" style="font-size:13.5px;padding:10px 0;display:none;">標準の図に戻す</button>
    </div>
    <input id="imgFile" type="file" accept="image/*" style="display:none;">
  </div>

  <div class="card">
    <h2>記録一覧</h2>
    <ul class="mark-list" id="markList"></ul>
    <div class="empty" id="emptyMsg">まだ記録はありません。「✏ 追加」に切り替えて人体図をタップしてください。</div>
  </div>

  <div class="card">
    <h2>画像として保存</h2>
    <div class="export-row">
      <button class="btn ghost" id="expOne">この向きを保存</button>
      <button class="btn" id="expAll">全方向まとめて保存</button>
    </div>
  </div>
  <div class="adslot"><span>広告スペース（ここに広告を表示）</span></div>
</div>

<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet">
  <div class="grip"></div>
  <h3><span id="sheetNo" class="badge" style="background:#888">1</span><span>マークの内容</span></h3>
  <div class="fld"><label>部位（自動判定・修正できます）</label><input id="partIn" placeholder="例）右前腕"></div>
  <div class="tpl-grid" id="tplGrid"></div>
  <div class="size-row">
    <div class="f"><label>大きさ・縦 (cm)</label><input id="szH" type="number" inputmode="decimal" placeholder="例）3.0"></div>
    <div class="f"><label>大きさ・横 (cm)</label><input id="szW" type="number" inputmode="decimal" placeholder="例）2.5"></div>
  </div>
  <textarea id="memo" placeholder="メモ（状態・経過・処置内容など自由入力）"></textarea>
  <div class="sheet-actions">
    <button class="del" id="delBtn">削除</button>
    <button class="done" id="doneBtn">完了</button>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <p>画像を長押し→「写真に追加 / 画像を保存」でも保存できます</p>
    <img id="outImg" alt="記録画像">
    <div class="row">
      <a class="btn" id="dlLink" download="bodycheck.png" href="#">ダウンロード</a>
      <button class="btn ghost" id="closeModal">閉じる</button>
    </div>
  </div>
</div>

  function capsule(x1,y1,x2,y2,r){
    const a=Math.atan2(y2-y1,x2-x1), p=new Path2D();
    p.arc(x1,y1,r,a+Math.PI/2,a-Math.PI/2,true);
    p.arc(x2,y2,r,a-Math.PI/2,a+Math.PI/2,true);
    p.closePath(); return p;
  }
  function ell(cx,cy,rx,ry){const p=new Path2D();p.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);return p;}
  function distSeg(px,py,x1,y1,x2,y2){
    const dx=x2-x1,dy=y2-y1,L=dx*dx+dy*dy;
    let t=L?((px-x1)*dx+(py-y1)*dy)/L:0; t=Math.max(0,Math.min(1,t));
    return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));
  }

    return a;
  }

    const cimg=customImg[v]||builtin[v];
    if(cimg){
      const s=Math.min(W/cimg.width,H/cimg.height), w=cimg.width*s, h=cimg.height*s;
      c.drawImage(cimg,(W-w)/2,(H-h)/2,w,h);
      c.restore(); return;
    }
    if(v==='left'){c.translate(W,0);c.scale(-1,1);}
    const parts=bodyParts(v), oc=_off.getContext('2d');
    oc.clearRect(0,0,W,H); oc.fillStyle='#a9b4ba'; parts.forEach(p=>oc.fill(p));
    const o=2.0;
    [[-o,0],[o,0],[0,-o],[0,o],[-1.5,-1.5],[1.5,-1.5],[-1.5,1.5],[1.5,1.5]].forEach(g=>c.drawImage(_off,g[0],g[1]));
    oc.clearRect(0,0,W,H); oc.fillStyle='#ffffff'; parts.forEach(p=>oc.fill(p));
    c.drawImage(_off,0,0);
    detail(c,v);
    c.restore();
  }
  function detail(c,v){
    c.strokeStyle='#cdd5da'; c.fillStyle='#cdd5da'; c.lineCap='round'; c.lineJoin='round';
    const tick=(x1,y1,x2,y2,w)=>{c.lineWidth=w||2;c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();};
    if(v==='front'||v==='back'){
      tick(196,318,172,326,2); tick(364,318,388,326,2);   // elbows
      tick(232,648,256,650,2.2); tick(304,650,328,648,2.2);// knees
      tick(255,300,305,300,1.6);                            // waist hint
      if(v==='front'){
        c.beginPath();c.arc(265,80,4,0,Math.PI*2);c.fill();
        c.beginPath();c.arc(295,80,4,0,Math.PI*2);c.fill();
        c.lineWidth=3;c.beginPath();c.moveTo(269,102);c.quadraticCurveTo(280,108,291,102);c.stroke();
      }else{
        c.lineWidth=3;c.setLineDash([7,7]);c.beginPath();c.moveTo(280,176);c.lineTo(280,448);c.stroke();c.setLineDash([]);
        c.lineWidth=2.4;
        c.beginPath();c.moveTo(252,236);c.quadraticCurveTo(240,262,252,290);c.stroke();
        c.beginPath();c.moveTo(308,236);c.quadraticCurveTo(320,262,308,290);c.stroke();
      }
    }else{
      c.fillStyle='#ffffff';c.strokeStyle='#bcc6cc';c.lineWidth=2;
      c.beginPath();c.moveTo(290,74);c.lineTo(300,86);c.lineTo(290,92);c.closePath();c.fill();c.stroke();
      c.strokeStyle='#cdd5da';
      tick(238,326,262,330,2); tick(232,648,266,650,2.2);  // elbow,knee
    }
  }

  // ---------- regions (auto body-part, tuned to embedded figure) ----------
  function imgFor(v){return customImg[v]||builtin[v];}
  function toRef(v,x,y){
    const im=imgFor(v); if(!im) return {rx:-1,ry:-1};
    const s=Math.min(W/im.width,H/im.height), dw=im.width*s, dh=im.height*s, ox=(W-dw)/2, oy=(H-dh)/2;
    return {rx:(x-ox)/dw*1024, ry:(y-oy)/dh*1536};
  }
  function capR(name,x1,y1,x2,y2,r){const len=Math.hypot(x2-x1,y2-y1);return{name,cx:(x1+x2)/2,cy:(y1+y2)/2,area:len*2*r+Math.PI*r*r,c:(x,y)=>distSeg(x,y,x1,y1,x2,y2)<=r};}
  function ellR(name,cx,cy,rx,ry){return{name,cx,cy,area:Math.PI*rx*ry,c:(x,y)=>{const a=(x-cx)/rx,bb=(y-cy)/ry;return a*a+bb*bb<=1;}};}
  function fbRegions(v){
    const L=v==='front'?'右':'左', R=v==='front'?'左':'右';
    const up=v==='front'?'胸部':'背部', mid=v==='front'?'腹部':'腰部', low=v==='front'?'下腹部':'臀部', hd=v==='front'?'顔・頭部':'後頭部';
    const r=[
      ellR(L+'側頭部',452,150,42,58), ellR(R+'側頭部',572,150,42,58),
      capR(L+'上腕',360,330,338,690,40), capR(L+'前腕',338,690,300,800,28), ellR(L+'手',292,845,46,58),
      capR(R+'上腕',664,330,686,690,40), capR(R+'前腕',686,690,724,800,28), ellR(R+'手',732,845,46,58),
      capR(L+'大腿',466,865,452,1078,46), capR(L+'下腿',452,1078,450,1300,32), ellR(L+'足部',455,1400,60,70),
      capR(R+'大腿',558,865,572,1078,46), capR(R+'下腿',572,1078,574,1300,32), ellR(R+'足部',569,1400,60,70),
      ellR(hd,512,160,92,98), ellR('頸部',512,250,58,42),
      ellR(up,512,420,150,135), ellR(mid,512,620,140,120), ellR(low,512,810,135,95),
    ];
    if(v==='front') r.push(ellR('陰部',512,852,52,48));
    return r;
  }
  function sidePart(v,rx,ry){
    const s=v==='left'?'左':'右';
    let bx0,bx1,frontLow;
    if(v==='left'){bx0=405;bx1=600;frontLow=true;}   // faces left: front=low x
    else {bx0=428;bx1=622;frontLow=false;}           // faces right: front=high x
    const t=(bx1-bx0)/3, fEdge=bx0+t, bEdge=bx1-t;
    let col;
    if(rx<fEdge) col=frontLow?'front':'back';
    else if(rx>bEdge) col=frontLow?'back':'front';
    else col='mid';
    if(ry<270) return '側頭部';
    if(ry<345) return '頸部';
    if(ry<600) return col==='front'?'胸部':col==='back'?'背部':s+'上腕';
    if(ry<780) return col==='front'?'腹部':col==='back'?'腰部':s+'前腕';
    if(ry<905) return col==='front'?'陰部':col==='back'?'臀部':s+'手';
    if(ry<1140) return s+'大腿';
    if(ry<1360) return s+'下腿';
    return s+'足部';
  }
  function detectPart(v,x,y){
    const p=toRef(v,x,y); if(p.rx<0) return '';
    if(v==='left'||v==='right') return sidePart(v,p.rx,p.ry);
    const regs=fbRegions(v);
    const ins=regs.filter(r=>r.c(p.rx,p.ry));
    if(ins.length) return ins.reduce((a,b)=>a.area<b.area?a:b).name;
    return regs.reduce((a,b)=>Math.hypot(p.rx-a.cx,p.ry-a.cy)<Math.hypot(p.rx-b.cx,p.ry-b.cy)?a:b).name;
  }

  // ---------- marks ----------
  function hexA(hex,a){const n=parseInt(hex.slice(1),16);return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}
  function drawMarks(c,v){
    marks.filter(m=>m.view===v).forEach(m=>{
      const tpl=tplByKey(m.type);
      c.save();
      if(m.shape==='area'){
        c.beginPath();c.ellipse(m.x,m.y,m.rx,m.ry,0,0,Math.PI*2);
        c.fillStyle=hexA(tpl.color,0.22);c.fill();
        c.lineWidth=3;c.strokeStyle=tpl.color;c.stroke();
      }else{
        c.beginPath();c.arc(m.x,m.y,9,0,Math.PI*2);
        c.fillStyle=tpl.color;c.fill();c.lineWidth=2.5;c.strokeStyle='#fff';c.stroke();
      }
      const bx=m.shape==='area'?m.x+m.rx:m.x, by=m.shape==='area'?m.y-m.ry:m.y-16;
      c.beginPath();c.arc(bx,by,12,0,Math.PI*2);c.fillStyle=tpl.color;c.fill();
      c.lineWidth=2;c.strokeStyle='#fff';c.stroke();
      c.fillStyle='#fff';c.font='700 14px sans-serif';c.textAlign='center';c.textBaseline='middle';
      c.fillText(String(m.n),bx,by+1);
      c.restore();
    });
  }

  function render(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#e6eaec';ctx.fillRect(0,0,W,H);
    drawBody(ctx,view); drawMarks(ctx,view);
    ctx.fillStyle='#9aa6ac';ctx.font='700 26px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(VLABEL[view],18,16);
    renderList();
  }

  function renumber(){marks.forEach((m,i)=>m.n=i+1);}
  function hitTest(x,y){
    for(let i=marks.length-1;i>=0;i--){
      const m=marks[i]; if(m.view!==view) continue;
      if(m.shape==='area'){const dx=(x-m.x)/(m.rx+8),dy=(y-m.y)/(m.ry+8);if(dx*dx+dy*dy<=1)return m;}
      else{if(Math.hypot(x-m.x,y-m.y)<=16)return m;}
    }
    return null;
  }

  // ---------- pointer ----------
  let g=null;
  function toCanvas(e){const r=cv.getBoundingClientRect();return {x:(e.clientX-r.left)*(W/r.width),y:(e.clientY-r.top)*(H/r.height)};}
  cv.addEventListener('pointerdown',e=>{
    if(activeId!==null) return;            // ignore extra fingers (palm)
    activeId=e.pointerId; e.preventDefault();
    const p=toCanvas(e), hit=hitTest(p.x,p.y);
    if(hit){g={mode:'mark',mark:hit,sx:p.x,sy:p.y,offX:p.x-hit.x,offY:p.y-hit.y,moved:false};}
    else if(addMode){g={mode:'new',x:p.x,y:p.y};}
    else {g=null;}
    try{cv.setPointerCapture(e.pointerId);}catch(_){}
  });
  cv.addEventListener('pointermove',e=>{
    if(e.pointerId!==activeId||!g) return;
    const p=toCanvas(e);
    if(g.mode==='mark'){
      if(Math.abs(p.x-g.sx)>6||Math.abs(p.y-g.sy)>6)g.moved=true;
      if(g.moved){g.mark.x=p.x-g.offX;g.mark.y=p.y-g.offY;render();}
      return;
    }
    render();
    const dx=Math.abs(p.x-g.x),dy=Math.abs(p.y-g.y);
    if(dx>10||dy>10){
      ctx.save();ctx.beginPath();
      ctx.ellipse((g.x+p.x)/2,(g.y+p.y)/2,Math.max(dx/2,6),Math.max(dy/2,6),0,0,Math.PI*2);
      ctx.fillStyle=hexA(TEMPLATES[0].color,0.18);ctx.fill();
      ctx.lineWidth=2.5;ctx.strokeStyle=TEMPLATES[0].color;ctx.setLineDash([6,5]);ctx.stroke();ctx.restore();
    }
  });
  function endGesture(e){
    if(e.pointerId!==activeId){return;}
    activeId=null;
    if(!g){return;}
    const p=toCanvas(e);
    if(g.mode==='mark'){ if(g.moved){render();} else {openEditor(g.mark.id,false);} g=null; return;}
    const dx=Math.abs(p.x-g.x),dy=Math.abs(p.y-g.y);
    let m;
    if(dx>10||dy>10){
      m={id:Date.now()+Math.random(),n:0,view,shape:'area',x:(g.x+p.x)/2,y:(g.y+p.y)/2,
         rx:Math.max(dx/2,10),ry:Math.max(dy/2,10),type:'naishukketsu',memo:'',h:'',w:'',part:detectPart(view,(g.x+p.x)/2,(g.y+p.y)/2)};
    }else{
      m={id:Date.now()+Math.random(),n:0,view,shape:'point',x:p.x,y:p.y,type:'naishukketsu',memo:'',h:'',w:'',part:detectPart(view,p.x,p.y)};
    }
    marks.push(m); renumber(); render(); openEditor(m.id,true);
    g=null;
  }
  cv.addEventListener('pointerup',endGesture);
  cv.addEventListener('pointercancel',e=>{if(e.pointerId===activeId){activeId=null;g=null;render();}});

  // ---------- legend ----------
  document.getElementById('legend').innerHTML=TEMPLATES.map(t=>`<span class="chip"><span class="dot" style="background:${t.color}"></span>${t.name}</span>`).join('');

  // ---------- editor ----------
  const sheet=document.getElementById('sheet'), sheetBg=document.getElementById('sheetBg'), tplGrid=document.getElementById('tplGrid');
  tplGrid.innerHTML=TEMPLATES.map(t=>`<div class="tpl" data-k="${t.k}"><span class="d" style="background:${t.color}"></span>${t.name}</div>`).join('');

  function openEditor(id,isNew){
    editingId=id; newMarkId=isNew?id:null;
    const m=marks.find(x=>x.id===id); if(!m) return;
    document.getElementById('sheetNo').textContent=m.n;
    document.getElementById('sheetNo').style.background=tplByKey(m.type).color;
    document.getElementById('partIn').value=m.part||'';
    document.getElementById('szH').value=m.h||'';
    document.getElementById('szW').value=m.w||'';
    document.getElementById('memo').value=m.memo||'';
    [...tplGrid.children].forEach(c=>c.classList.toggle('sel',c.dataset.k===m.type));
    sheetBg.style.display='block'; sheet.classList.add('open');
  }
  function closeEditor(cancel){
    if(cancel && newMarkId!==null){ marks=marks.filter(x=>x.id!==newMarkId); renumber(); render(); }
    newMarkId=null; editingId=null;
    sheet.classList.remove('open'); sheetBg.style.display='none';
  }
  tplGrid.addEventListener('click',e=>{
    const t=e.target.closest('.tpl'); if(!t) return;
    const m=marks.find(x=>x.id===editingId); if(!m) return;
    m.type=t.dataset.k;
    [...tplGrid.children].forEach(c=>c.classList.toggle('sel',c===t));
    document.getElementById('sheetNo').style.background=tplByKey(m.type).color; render();
  });
  document.getElementById('partIn').addEventListener('input',e=>{const m=marks.find(x=>x.id===editingId);if(m)m.part=e.target.value;});
  document.getElementById('szH').addEventListener('input',e=>{const m=marks.find(x=>x.id===editingId);if(m)m.h=e.target.value;});
  document.getElementById('szW').addEventListener('input',e=>{const m=marks.find(x=>x.id===editingId);if(m)m.w=e.target.value;});
  document.getElementById('memo').addEventListener('input',e=>{const m=marks.find(x=>x.id===editingId);if(m)m.memo=e.target.value;});
  document.getElementById('doneBtn').addEventListener('click',()=>{newMarkId=null;render();closeEditor(false);});
  sheetBg.addEventListener('click',()=>closeEditor(true));
  document.getElementById('delBtn').addEventListener('click',()=>{marks=marks.filter(x=>x.id!==editingId);newMarkId=null;renumber();render();closeEditor(false);});

  // ---------- list ----------
  function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  function renderList(){
    const ul=document.getElementById('markList'), em=document.getElementById('emptyMsg');
    if(marks.length===0){ul.innerHTML='';em.style.display='block';return;}
    em.style.display='none';
    ul.innerHTML=marks.map(m=>{
      const t=tplByKey(m.type);
      const size=(m.h||m.w)?`　${m.w||'?'}×${m.h||'?'}cm`:'';
      const part=m.part?escapeHtml(m.part)+'・':'';
      const memo=m.memo?`<div class="s">${escapeHtml(m.memo)}</div>`:'';
      return `<li data-id="${m.id}"><span class="badge" style="background:${t.color}">${m.n}</span><div class="mark-body"><div class="t">${part}${t.name}${size}<span class="view-tag">${VLABEL[m.view]}</span></div>${memo}</div></li>`;
    }).join('');
    [...ul.children].forEach(li=>li.addEventListener('click',()=>{
      const m=marks.find(x=>String(x.id)===li.dataset.id);
      if(m){if(m.view!==view)switchView(m.view);openEditor(m.id,false);}
    }));
  }

  // ---------- view & mode ----------
  function switchView(v){view=v;[...document.getElementById('viewTabs').children].forEach(b=>b.classList.toggle('on',b.dataset.v===v));updateImgBtns();render();}
  document.getElementById('viewTabs').addEventListener('click',e=>{const b=e.target.closest('button');if(b)switchView(b.dataset.v);});

  // ---------- custom figure image ----------
  const imgFile=document.getElementById('imgFile');
  function updateImgBtns(){document.getElementById('resetImgBtn').style.display=customImg[view]?'block':'none';}
  document.getElementById('loadImgBtn').addEventListener('click',()=>{imgFile.value='';imgFile.click();});
  imgFile.addEventListener('change',e=>{
    const f=e.target.files&&e.target.files[0]; if(!f) return;
    const tv=view, r=new FileReader();
    r.onload=()=>{const im=new Image();im.onload=()=>{customImg[tv]=im;updateImgBtns();render();};im.src=r.result;};
    r.readAsDataURL(f);
  });
  document.getElementById('resetImgBtn').addEventListener('click',()=>{customImg[view]=null;updateImgBtns();render();});
  function setMode(add){
    addMode=add;
    document.getElementById('mAdd').classList.toggle('on',add);
    document.getElementById('mMove').classList.toggle('on',!add);
    document.getElementById('hint').textContent=add
      ?'追加モード：タップで点、なぞって範囲。置いたら「完了」で確定します。'
      :'移動・確認モード：マークをタップで編集、ドラッグで移動。誤って増えません。';
  }
  document.getElementById('modeBar').addEventListener('click',e=>{const b=e.target.closest('button');if(b)setMode(b.dataset.m==='add');});

  document.getElementById('clearBtn').addEventListener('click',()=>{
    if(marks.length>0 && !confirm('現在の記録（マークと利用者情報）をすべて消去して新規記録を始めますか？')) return;
    marks=[];editingId=null;newMarkId=null;
    document.getElementById('resName').value='';
    document.getElementById('recBy').value='';
    setMode(false); switchView('front'); render();
  });

  // ---------- export ----------
  function exHeader(c,wpx){
    const name=document.getElementById('resName').value||'（利用者名 未入力）';
    const date=document.getElementById('recDate').value||'';
    const by=document.getElementById('recBy').value||'';
    c.fillStyle='#20303a';c.font='700 26px sans-serif';c.textAlign='left';c.textBaseline='alphabetic';
    c.fillText('ボディチェック記録',24,40);
    c.font='400 18px sans-serif';c.fillStyle='#5b6b74';
    c.fillText('利用者：'+name+'　　記録日：'+date+'　　記録者：'+by,24,70);
    c.strokeStyle='#d3dade';c.lineWidth=1;c.beginPath();c.moveTo(24,84);c.lineTo(wpx-24,84);c.stroke();
  }
  function drawViewTo(c,v,ox,oy,label){
    c.save();c.translate(ox,oy);
    c.fillStyle='#e6eaec';c.fillRect(0,0,W,H);
    drawBody(c,v);drawMarks(c,v);
    c.fillStyle='#20303a';c.font='700 22px sans-serif';c.textAlign='left';c.textBaseline='top';
    c.fillText(label,16,16);c.restore();
  }
  function notesBlock(c,x,y){
    c.fillStyle='#20303a';c.font='700 18px sans-serif';c.textAlign='left';c.textBaseline='alphabetic';
    c.fillText('記録一覧',x,y);
    c.font='400 16px sans-serif';
    if(marks.length===0){c.fillStyle='#5b6b74';c.fillText('記録なし',x,y+24);return;}
    marks.forEach(m=>{
      y+=27;const t=tplByKey(m.type);
      c.fillStyle=t.color;c.beginPath();c.arc(x+9,y-5,9,0,Math.PI*2);c.fill();
      c.fillStyle='#fff';c.font='700 12px sans-serif';c.textAlign='center';c.fillText(m.n,x+9,y-1);
      c.textAlign='left';c.fillStyle='#20303a';c.font='400 16px sans-serif';
      const size=(m.h||m.w)?`  ${m.w||'?'}×${m.h||'?'}cm`:'';
      let line=`${VLABEL[m.view]}・${m.part?m.part+'・':''}${t.name}${size}`;
      if(m.memo)line+='　'+m.memo;
      c.fillText(line.slice(0,42),x+26,y);
    });
  }
  function showModal(url,fn){document.getElementById('outImg').src=url;const a=document.getElementById('dlLink');a.href=url;a.download=fn;document.getElementById('modalBg').style.display='flex';}
  document.getElementById('closeModal').addEventListener('click',()=>{document.getElementById('modalBg').style.display='none';});

  document.getElementById('expOne').addEventListener('click',()=>{
    const PAD=24,top=100;
    const c=document.createElement('canvas');c.width=W+PAD*2;c.height=top+H+24;
    const x=c.getContext('2d');x.fillStyle='#fff';x.fillRect(0,0,c.width,c.height);
    exHeader(x,c.width);drawViewTo(x,view,PAD,top,VLABEL[view]);
    showModal(c.toDataURL('image/png'),'bodycheck_'+view+'.png');
  });
  document.getElementById('expAll').addEventListener('click',()=>{
    const PAD=20,top=100,gap=14;
    const cw=PAD*2+W*2+gap, notesH=60+Math.max(1,marks.length)*27+30;
    const c=document.createElement('canvas');c.width=cw;c.height=top+H*2+gap+notesH;
    const x=c.getContext('2d');x.fillStyle='#fff';x.fillRect(0,0,c.width,c.height);
    exHeader(x,cw);
    const col2=PAD+W+gap,row2=top+H+gap;
    drawViewTo(x,'front',PAD,top,'前面');drawViewTo(x,'back',col2,top,'背面');
    drawViewTo(x,'left',PAD,row2,'左側面');drawViewTo(x,'right',col2,row2,'右側面');
    notesBlock(x,PAD,row2+H+34);
    showModal(c.toDataURL('image/png'),'bodycheck_all.png');
  });

  [["front",IMG_SRC.front],["back",IMG_SRC.back],["left",IMG_SRC.left],["right",IMG_SRC.right]]
    .forEach(p=>{const im=new Image();im.onload=()=>{builtin[p[0]]=im;render();};im.src=p[1];});
  setMode(false); render();
})();
</script>
</body>
</html>
